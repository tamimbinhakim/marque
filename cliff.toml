# git-cliff — CHANGELOG generator
# https://git-cliff.org
#
# Marque is a specification repository, not a code library. This config
# tunes git-cliff for the IETF-audience git log we actually want:
#   * Conventional Commits — <type>(<scope>): <subject>
#   * Scopes reflect the repo layout (spec, draft, schema, mip, docs,
#     ci, governance, chore, ref, build, repo).
#   * Output preserves the Keep-a-Changelog section ordering the
#     CHANGELOG.md file already uses (Added / Changed / Fixed /
#     Deprecated / Removed / Security / Restructured / Initialized).
#   * Breaking changes surface at the top of each release.
#
# Usage:
#   git-cliff --tag $NEXT_TAG --prepend CHANGELOG.md    # before release
#   git-cliff --unreleased --prepend CHANGELOG.md       # mid-cycle update
#   git-cliff --tag $NEXT_TAG --output CHANGELOG.md     # full regen

[changelog]
header = """
# Changelog

All notable changes to the Marque specification will be documented here. Changes to normative behavior are anchored to the MIP that introduced them.

The format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/). Version numbers follow `YYYY.MM.seq` where `seq` is the within-month revision counter.

Entries below this banner are generated by [`git-cliff`](https://git-cliff.org) from [Conventional Commits](https://www.conventionalcommits.org) (`<type>(<scope>): <subject>`). Do not hand-edit generated sections — edit the commit message and regenerate with `git-cliff --tag <next-tag> --prepend CHANGELOG.md`. Pre-`git-cliff` entries below the `---` divider were hand-authored and are preserved verbatim for history.

"""

body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif -%}
          {{ commit.message | upper_first }}{% if commit.breaking %} **[BREAKING]**{% endif %}
          {%- if commit.id %} ([`{{ commit.id | truncate(length=7, end="") }}`](../../commit/{{ commit.id }})){% endif %}
    {% endfor %}
{% endfor %}
{%- if breaking_changes -%}
    ### BREAKING CHANGES ⚠
    {% for breaking in breaking_changes %}
        - {{ breaking.message }}
    {% endfor %}
{% endif %}
"""

trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"

# Conventional-Commit types → CHANGELOG section headings.
# Order matches Keep-a-Changelog plus two spec-specific sections at the end.
commit_parsers = [
  { message = "^feat",      group = "Added" },
  { message = "^add",       group = "Added" },
  { message = "^change",    group = "Changed" },
  { message = "^update",    group = "Changed" },
  { message = "^refactor",  group = "Changed" },
  { message = "^fix",       group = "Fixed" },
  { message = "^revert",    group = "Fixed" },
  { message = "^deprecate", group = "Deprecated" },
  { message = "^remove",    group = "Removed" },
  { message = "^security",  group = "Security" },
  { message = "^sec",       group = "Security" },
  { message = "^perf",      group = "Performance" },
  { message = "^ref",       group = "References and citations" },
  { message = "^cite",      group = "References and citations" },
  { message = "^docs",      group = "Documentation" },
  { message = "^doc",       group = "Documentation" },
  { message = "^spec",      group = "Specification" },
  { message = "^draft",     group = "Internet-Drafts" },
  { message = "^schema",    group = "Schemas" },
  { message = "^mip",       group = "MIPs" },
  { message = "^governance",group = "Governance" },
  { message = "^test",      group = "Tests" },
  { message = "^ci",        group = "CI/CD" },
  { message = "^build",     group = "Build" },
  { message = "^chore",     group = "Maintenance" },
  { message = "^style",     group = "Maintenance" },
  # Catch-all for commits that don't match above; keep them out of the
  # CHANGELOG rather than dumping them into a "Misc" bucket.
  { message = ".*",         skip = true },
]

# Filter out automated / merge commits.
commit_preprocessors = [
  { pattern = '\s*Co-Authored-By:\s*.*',      replace = "" },
  { pattern = '\s*Co-authored-by:\s*.*',      replace = "" },
  { pattern = '\s*Signed-off-by:\s*.*',       replace = "" },
]

protect_breaking_commits = true
filter_commits = false
